//  Clean + dedupe + validate
const timeZones = [...new Set(
    rawTimeZones
        .split("\n")
        .map(z => z.trim())
        .filter(z => z.length > 0)
)].filter(zone => {
    try {
        new Intl.DateTimeFormat("en-US", { timeZone: zone });
        return true;
    } catch {
        return false;
    }
});

function getLocalTime(zone) {
    const now = new Date();
    const parts = new Intl.DateTimeFormat('en-US', {
        timeZone: zone,
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false
    }).formatToParts(now);

    return {
        h: parseInt(parts.find(p => p.type === 'hour').value),
        m: parseInt(parts.find(p => p.type === 'minute').value),
        s: parseInt(parts.find(p => p.type === 'second').value)
    };
}

//  Find top 3 zones approaching 5PM
function findBestZones() {
    let activeZones = [];
    let upcomingZones = [];

    for (let zone of timeZones) {
        const { h, m, s } = getLocalTime(zone);

        const currentSeconds = h * 3600 + m * 60 + s;
        const fivePM = 17 * 3600;
        const sixPM = 18 * 3600;

        //  PRIORITY: zones currently in 5PM hour
        if (currentSeconds >= fivePM && currentSeconds < sixPM) {
            activeZones.push({
                zone,
                secondsIntoHour: currentSeconds - fivePM
            });
        } else {
            //  Otherwise calculate time until NEXT 5PM
            let secondsTo5;

            if (currentSeconds < fivePM) {
                secondsTo5 = fivePM - currentSeconds;
            } else {
                secondsTo5 = (86400 - currentSeconds) + fivePM;
            }

            upcomingZones.push({
                zone,
                secondsTo5
            });
        }
    }

    //  If any zone is currently in 5PM hour → STAY THERE
    if (activeZones.length > 0) {
        activeZones.sort((a, b) => a.secondsIntoHour - b.secondsIntoHour);

        const main = activeZones[0];

        // fill with upcoming zones for display
        upcomingZones.sort((a, b) => a.secondsTo5 - b.secondsTo5);

        return [
            { zone: main.zone, secondsTo5: 0 },
            ...upcomingZones.slice(0, 2)
        ];
    }

    //  Otherwise → find next zones approaching 5PM
    upcomingZones.sort((a, b) => a.secondsTo5 - b.secondsTo5);

    return upcomingZones.slice(0, 3);
}

//  Format countdown
function formatTime(sec) {
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

//  Update display
function update() {
    const topZones = findBestZones();
    const best = topZones[0];

    const { h, m, s } = getLocalTime(best.zone);

    // Clock
    document.getElementById("time").innerText =
        `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

    // Location
    document.getElementById("location").innerText =
        best.zone.replace(/_/g, " ");

    // Countdown
    if (best.secondsTo5 === 0) {
        document.getElementById("countdown").innerText = " IT'S 5PM ";
    } else {
        document.getElementById("countdown").innerText =
            `5PM in ${formatTime(best.secondsTo5)}`;
    }

    // Top 3
    document.getElementById("top3").innerText =
        topZones.map((z, i) =>
            `${i+1}. ${z.zone.replace(/_/g," ")} (${formatTime(z.secondsTo5)})`
        ).join("\n");
}

setInterval(update, 1000);
update();
